<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 700px;
    background: #1c1a24;
    color: #ece2d3;
    font-family: 'Fraunces', Georgia, serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.8  0 0 0 0 0.75  0 0 0 0 0.85  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.05;
  }
  .glow {
    position: absolute;
    top: -120px; right: -80px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(201,156,222,0.15) 0%, transparent 60%);
  }
  .glow2 {
    position: absolute;
    bottom: -100px; left: 200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(232,118,148,0.08) 0%, transparent 60%);
  }

  /* pinned elements */
  .eyebrow {
    position: absolute;
    top: 52px; left: 72px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #7c6e7f;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #a6c97d;
    box-shadow: 0 0 8px rgba(166,201,125,0.9);
  }

  h1 {
    position: absolute;
    top: 50%;
    left: 72px;
    transform: translateY(-50%);
    font-size: 108px;
    font-weight: 500;
    line-height: 0.91;
    letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144;
  }
  h1 em {
    font-style: italic;
    color: #c99cde;
    font-weight: 400;
    font-variation-settings: "opsz" 96;
    display: block;
  }
  h1 .last { display: block; }
  h1 .amp { color: #e87694; font-style: italic; }

  .bottom {
    position: absolute;
    bottom: 52px; left: 72px; right: 72px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .lede {
    font-size: 20px;
    color: #b9ab9e;
    line-height: 1.4;
  }
  .lede strong { color: #ece2d3; font-weight: 500; }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #7c6e7f;
    white-space: nowrap;
  }
  .url span { color: #a6c97d; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>

<div class="eyebrow"><div class="dot"></div>pigsmom.com · los angeles</div>

<h1>boring tech,<em>sharp takes,</em><span class="last"><span class="amp">&amp;</span> one pig.</span></h1>

<div class="bottom">
  <p class="lede"><strong>emma wirt</strong> · platform at fika ventures · AI, data infra, boring tech.</p>
  <span class="url"><span>~/</span>pigsmom.com</span>
</div>
</body>
</html>
